{% extends "base.html" %}

{% block content %}
<div style="height: calc(100vh - 100px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
    <div style="position: relative; margin-bottom: 2rem;">
        <h1 style="font-size: 10rem; font-weight: 900; line-height: 0.8; margin: 0; background: linear-gradient(135deg, #ccff00, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.15;">404</h1>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%;">
            <i class="fas fa-satellite-dish" style="font-size: 4rem; color: var(--primary); margin-bottom: 1.5rem; display: block; filter: drop-shadow(0 0 15px var(--primary-glow));"></i>
            <h2 style="font-size: 2.2rem; font-weight: 800; color: #fff; margin: 0; letter-spacing: -0.02em;">Signal Lost in Space</h2>
        </div>
    </div>
    
    <p style="max-width: 500px; color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
        The neural intelligence path you're looking for doesn't exist or has been relocated to a secure sector.
    </p>

    <div style="display: flex; gap: 1rem;">
        <button onclick="window.history.back()" class="btn btn-secondary" style="padding: 1rem 2rem; border-radius: 16px;">
            <i class="fas fa-arrow-left"></i> Go Back
        </button>
        <a href="/dashboard" class="btn btn-primary" style="padding: 1rem 2.5rem; border-radius: 16px;">
            <i class="fas fa-home"></i> Return to Base
        </a>
    </div>

    <!-- Background Decoration -->
    <div style="position: fixed; top: 20%; left: 10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(204,255,0,0.05) 0%, transparent 70%); z-index: -1;"></div>
    <div style="position: fixed; bottom: 10%; right: 5%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(79,70,229,0.05) 0%, transparent 70%); z-index: -1;"></div>
</div>
{% endblock %}
