<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLPCRM | Neural Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ccff00;
            --bg-dark: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
            --text-main: #f1f5f9;
            --text-muted: #8899aa;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Animated Mesh Background */
        .mesh {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(204, 255, 0, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            filter: blur(80px);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(20, 28, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
            transform: rotate(-5deg);
        }

        .logo-box i { color: #000; font-size: 1.6rem; }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.85rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            color: #ef4444;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .input-container {
            position: relative;
        }

        .input-container i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .input-container input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1rem 1rem 3.25rem;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-container input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(204, 255, 0, 0.1);
        }

        .input-container input:focus + i {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(204, 255, 0, 0.2);
            filter: brightness(1.1);
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .live-status {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="mesh"></div>

    <div class="login-card">
        <div class="logo-section">
            <div class="logo-box">
                <i class="fas fa-brain"></i>
            </div>
            <h1>NLP<span style="color: var(--primary);">CRM</span></h1>
            <p>Communication Intelligence Platform</p>
        </div>

        {% if error %}
        <div class="alert-error">
            <i class="fas fa-shield-alt"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Auth Identifier</label>
                <div class="input-container">
                    <i class="fas fa-user-shield"></i>
                    <input type="email" name="email" value="admin@nlpcrm.com" required placeholder="admin@nlpcrm.com">
                </div>
            </div>
            <div class="form-group">
                <label>Secure Credential</label>
                <div class="input-container">
                    <i class="fas fa-key"></i>
                    <input type="password" name="password" value="admin@2026" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-fingerprint"></i> AUTHORIZE SESSION
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 NLPCRM Intelligence &mdash; v3.1 Stable
        </div>
    </div>

    <div class="live-status">
        <div class="pulse"></div>
        Neural Link Active
    </div>
</body>
</html>
