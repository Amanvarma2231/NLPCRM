<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLPCRM — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }
        .page { width: 100%; max-width: 400px; padding: 1rem; }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo-icon {
            width: 52px; height: 52px;
            background: #6366f1;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon i { color: #fff; font-size: 1.4rem; }
        .logo h1 { font-size: 1.6rem; font-weight: 800; color: #0f172a; letter-spacing: -0.03em; }
        .logo p { font-size: 0.82rem; color: #94a3b8; margin-top: 0.3rem; }
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.4rem;
        }
        .input-wrap { position: relative; }
        .input-wrap .ico {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.85rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem 0.9rem 0.75rem 2.5rem;
            color: #0f172a;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap input::placeholder { color: #cbd5e1; }
        .input-wrap input:focus {
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: opacity 0.2s, transform 0.1s;
            text-decoration: none;
        }
        .btn:active { transform: scale(0.99); }
        .btn-primary {
            background: #6366f1;
            color: #fff;
            margin-top: 0.25rem;
        }
        .btn-primary:hover { background: #4f46e5; }
        .btn-google {
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .btn-google:hover { background: #f9fafb; }
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.73rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <h1>NLPCRM</h1>
            <p>AI-Powered Communication Intelligence</p>
        </div>

        {% if error %}
        <div class="alert-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('main.login') }}" autocomplete="on">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label>Email Address</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope ico"></i>
                    <input type="email" name="email" placeholder="Enter your email"
                           required autocomplete="email" autofocus>
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock ico"></i>
                    <input type="password" name="password" placeholder="Enter your password"
                           required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        {% if google_configured %}
        <div class="divider"><span>or continue with</span></div>
        <a href="{{ url_for('main.login_google') }}" class="btn btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
        </a>
        {% endif %}

        <div class="footer">&copy; 2026 NLPCRM &mdash; All rights reserved</div>
    </div>
</div>
</body>
</html>
